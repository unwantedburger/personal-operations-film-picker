<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0d12" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f7f7f9" media="(prefers-color-scheme: light)">
  <title>Films</title>
  <link rel="apple-touch-icon" href="data:,">
  <style>
    :root {
      color-scheme: dark light;
      --bg: #0b0d12;
      --fg: #e6e9ef;
      --muted: #8a90a0;
      --accent: #66e07a;
      --card: #161922;
      --card-border: #232732;
      --input-bg: #1d2030;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f7f7f9;
        --fg: #15171c;
        --muted: #5b606b;
        --card: #ffffff;
        --card-border: #e3e5ea;
        --input-bg: #ffffff;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
    }
    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: env(safe-area-inset-top) 1.25rem env(safe-area-inset-bottom);
    }
    header { padding: 1.25rem 0 0.5rem; display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; }
    h1 {
      font-size: 0.85rem;
      font-weight: 600;
      margin: 0;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .meta {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .meta button {
      background: none;
      border: 0;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      text-decoration: underline;
      padding: 0;
    }
    .search-wrap {
      position: sticky;
      top: 0;
      background: var(--bg);
      padding: 0.5rem 0 1rem;
      z-index: 1;
    }
    input[type="search"] {
      width: 100%;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      font-family: inherit;
      background: var(--input-bg);
      color: var(--fg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      outline: none;
      -webkit-appearance: none;
    }
    input[type="search"]:focus {
      border-color: var(--accent);
    }
    .count {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 0.4rem;
      letter-spacing: 0.04em;
    }
    ul.films {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 0.5rem;
    }
    li.film {
      display: grid;
      grid-template-columns: 0.6rem 1fr auto;
      gap: 0.75rem;
      align-items: center;
      padding: 0.85rem 1rem;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
    }
    .dot {
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      background: var(--accent);
    }
    .dot.watched { background: var(--muted); opacity: 0.6; }
    .title {
      font-weight: 600;
      line-height: 1.3;
    }
    .sub {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.15rem;
    }
    .rating {
      color: var(--muted);
      font-size: 0.85rem;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .state {
      padding: 2rem 0;
      text-align: center;
      color: var(--muted);
    }
    .state.error { color: #ff7a59; }
    footer {
      padding: 1.25rem 0 1.5rem;
      color: var(--muted);
      font-size: 0.75rem;
      text-align: center;
      letter-spacing: 0.04em;
    }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Films</h1>
      <div class="meta">
        <span id="updated"></span>
        · <button id="refresh">refresh</button>
      </div>
    </header>

    <div class="search-wrap">
      <input id="search" type="search" placeholder="Search title, director, genre…" autocomplete="off" spellcheck="false">
      <div class="count" id="count"></div>
    </div>

    <div id="status" class="state">Loading…</div>
    <ul class="films" id="films" hidden></ul>

    <footer>
      <span id="size"></span> · <button id="fresh" type="button" style="background:none;border:0;color:inherit;font:inherit;cursor:pointer;text-decoration:underline;padding:0;">pull fresh data from solvors-mbp</button>
    </footer>
  </div>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
