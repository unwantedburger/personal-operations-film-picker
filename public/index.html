<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0d12" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f7f7f9" media="(prefers-color-scheme: light)">
  <title>Films</title>
  <link rel="apple-touch-icon" href="data:,">
  <style>
    :root {
      color-scheme: dark light;
      --bg: #0b0d12;
      --fg: #e6e9ef;
      --muted: #8a90a0;
      --accent: #66e07a;
      --card: #161922;
      --card-border: #232732;
      --input-bg: #1d2030;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f7f7f9;
        --fg: #15171c;
        --muted: #5b606b;
        --card: #ffffff;
        --card-border: #e3e5ea;
        --input-bg: #ffffff;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
    }
    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: env(safe-area-inset-top) 1.25rem env(safe-area-inset-bottom);
    }
    header { padding: 1.25rem 0 0.5rem; display: flex; justify-content: space-between; align-items: baseline; gap: 1rem; }
    .title-group { display: flex; align-items: baseline; gap: 0.5rem; min-width: 0; }
    .back {
      color: var(--muted);
      text-decoration: none;
      font-size: 1.1rem;
      padding: 0 0.25rem;
    }
    .back:hover { color: var(--fg); }
    h1 {
      font-size: 0.85rem;
      font-weight: 600;
      margin: 0;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* "Lists ▾" header dropdown to navigate between views */
    .lists-menu { position: relative; display: inline-block; }
    .lists-menu summary {
      list-style: none;
      cursor: pointer;
      color: var(--muted);
      user-select: none;
    }
    .lists-menu summary::-webkit-details-marker { display: none; }
    .lists-menu-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 0.4rem;
      min-width: 220px;
      max-height: 60vh;
      overflow: auto;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.35);
      padding: 0.4rem;
      z-index: 30;
    }
    .lists-menu-dropdown a {
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.55rem 0.7rem;
      border-radius: 8px;
      color: var(--fg);
      text-decoration: none;
      font-size: 0.95rem;
    }
    .lists-menu-dropdown a:hover { background: var(--input-bg); }
    .lists-menu-dropdown a.current { color: var(--accent); }
    .lists-menu-dropdown .count { color: var(--muted); font-size: 0.8rem; }
    .lists-menu-dropdown .empty {
      color: var(--muted);
      padding: 0.55rem 0.7rem;
      font-size: 0.85rem;
    }
    .meta {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .meta button {
      background: none;
      border: 0;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      text-decoration: underline;
      padding: 0;
    }
    .search-wrap {
      position: sticky;
      top: 0;
      background: var(--bg);
      padding: 0.5rem 0 1rem;
      z-index: 1;
    }
    input[type="search"] {
      width: 100%;
      padding: 0.85rem 1rem;
      font-size: 1rem;
      font-family: inherit;
      background: var(--input-bg);
      color: var(--fg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      outline: none;
      -webkit-appearance: none;
    }
    input[type="search"]:focus {
      border-color: var(--accent);
    }
    .count {
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 0.4rem;
      letter-spacing: 0.04em;
    }
    ul.films {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 0.5rem;
    }
    li.film {
      display: grid;
      grid-template-columns: 0.6rem 2.6rem 1fr auto auto;
      gap: 0.75rem;
      align-items: center;
      padding: 0.85rem 1rem;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
    }
    .film-thumb {
      width: 2.6rem;
      height: 3.9rem;
      object-fit: cover;
      border-radius: 4px;
      background: var(--input-bg);
    }
    .film-thumb.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-weight: 700;
      font-size: 1rem;
    }
    .film-main { min-width: 0; }
    .lists-chip {
      display: inline-block;
      margin-left: 0.5rem;
      padding: 0.05rem 0.5rem;
      border-radius: 999px;
      background: rgba(102, 224, 122, 0.13);
      color: var(--accent);
      font-size: 0.78rem;
      vertical-align: middle;
    }
    @media (prefers-color-scheme: light) {
      .lists-chip { background: rgba(34, 156, 60, 0.13); color: #229c3c; }
    }
    /* Dropdown for managing lists per film — absolute-positioned
       popover anchored to the + button on the right of the row. */
    li.film .list-menu { position: relative; }
    li.film .list-menu summary {
      list-style: none;
      cursor: pointer;
      width: 2.2rem;
      height: 2.2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--muted);
      font-size: 1.1rem;
      font-weight: 600;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    li.film .list-menu summary::-webkit-details-marker { display: none; }
    li.film .list-menu[open] summary { color: var(--accent); border-color: var(--accent); }
    li.film .list-dropdown {
      position: absolute;
      top: calc(100% + 0.5rem);
      right: 0;
      z-index: 20;
      min-width: 240px;
      max-width: 90vw;
      max-height: 60vh;
      overflow: auto;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 0.85rem;
      box-shadow: 0 12px 28px rgba(0,0,0,0.35);
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .list-row {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.25rem 0;
      cursor: pointer;
    }
    .list-row input[type="checkbox"] {
      width: 1.1rem; height: 1.1rem;
      accent-color: var(--accent);
    }
    .list-dropdown .empty {
      color: var(--muted);
      font-size: 0.85rem;
      padding: 0.25rem 0;
    }
    .new-list-form {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .new-list-form input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      background: var(--input-bg);
      color: var(--fg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      font: inherit;
      font-size: 0.9rem;
    }
    .new-list-form input:focus { outline: none; border-color: var(--accent); }
    .new-list-form button {
      padding: 0 1rem;
      background: var(--accent);
      color: #0b0d12;
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .dot {
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      background: var(--accent);
    }
    .dot.watched { background: var(--muted); opacity: 0.6; }
    .title {
      font-weight: 600;
      line-height: 1.3;
    }
    .sub {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 0.15rem;
    }
    .rating {
      color: var(--muted);
      font-size: 0.85rem;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .state {
      padding: 2rem 0;
      text-align: center;
      color: var(--muted);
    }
    .state.error { color: #ff7a59; }
    /* Film detail view ─────────────────────────────────────────── */
    .film-detail {
      padding: 0.5rem 0 1rem;
      position: relative;
    }
    .detail-backdrop {
      position: absolute;
      inset: -0.5rem -1.25rem auto -1.25rem;
      height: 240px;
      background-size: cover;
      background-position: center;
      opacity: 0.18;
      filter: blur(20px);
      pointer-events: none;
      z-index: -1;
    }
    .detail-head {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 1rem;
      align-items: start;
      margin-bottom: 1.25rem;
    }
    .detail-poster {
      width: 110px;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.4);
      background: var(--input-bg);
    }
    .detail-text { min-width: 0; }
    .ext-link {
      color: var(--muted);
      text-decoration: underline;
    }
    .rating-pill.plex {
      background: rgba(255,122,89,0.12);
      color: var(--off);
    }
    .film-detail .title {
      font-size: 1.55rem;
      font-weight: 700;
      line-height: 1.15;
      margin: 0 0 0.4rem;
    }
    .film-detail .meta-row {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0 0 1rem;
      line-height: 1.5;
    }
    .film-detail .meta-row .rating-pill {
      display: inline-block;
      padding: 0 0.5rem;
      margin-left: 0.4rem;
      border-radius: 999px;
      background: rgba(102, 224, 122, 0.13);
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
    .film-detail .tagline {
      font-style: italic;
      color: var(--muted);
      margin: 0 0 1rem;
    }
    .film-detail .summary {
      line-height: 1.5;
      margin: 0 0 1.5rem;
    }
    .film-detail .credits {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 0.4rem 1rem;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .film-detail .credits dt {
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.78rem;
      align-self: baseline;
      padding-top: 0.1rem;
    }
    .film-detail .credits dd { margin: 0; }
    .film-detail .lists-section {
      padding-top: 1rem;
      border-top: 1px solid var(--card-border);
    }
    .film-detail .lists-section h2 {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 0.75rem;
    }
    .film-detail .lists-section .list-row {
      padding: 0.4rem 0;
    }
    /* Wheel / carousel view ─────────────────────────────────────── */
    :root {
      --wheel-a: #2a3344;
      --wheel-b: #303a4f;
      --wheel-fg: #e6e9ef;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --wheel-a: #e9e9ef;
        --wheel-b: #d8dde7;
        --wheel-fg: #15171c;
      }
    }
    .wheel-view {
      padding: 1rem 0 2rem;
    }
    .wheel-controls {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 1rem;
    }
    .wheel-controls .chips {
      display: flex; gap: 0.4rem; flex-wrap: wrap;
    }
    .wheel-controls .chip {
      display: inline-block;
      padding: 0.4rem 0.85rem;
      border-radius: 999px;
      border: 1px solid var(--card-border);
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      font-size: 0.85rem;
      text-decoration: none;
    }
    .wheel-controls .chip.active {
      border-color: var(--accent);
      color: var(--accent);
    }
    .wheel-controls .mode {
      margin-left: auto;
      display: inline-flex;
      gap: 0.4rem;
    }
    .wheel-controls .mode button {
      padding: 0.4rem 0.75rem;
      font-size: 0.85rem;
      width: auto;
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--muted);
    }
    .wheel-controls .mode button.active {
      border-color: var(--accent);
      color: var(--accent);
    }
    .wheel-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      position: relative;
    }
    .wheel-box .wheel {
      width: 100%;
      max-width: 520px;
      aspect-ratio: 1;
    }
    .wheel-box .wheel-rotor {
      transform-origin: 50% 50%;
    }
    .spin-btn {
      width: auto;
      padding: 0.85rem 2.5rem;
      background: var(--accent);
      color: #0b0d12;
      border: 0;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    .spin-btn:disabled { opacity: 0.5; }
    .winner {
      position: relative;
      width: 100%;
      max-width: 460px;
    }
    .winner-card {
      padding: 1.25rem 1.25rem;
      border-radius: 16px;
      background: var(--card);
      border: 1px solid var(--accent);
      text-align: center;
      box-shadow: 0 18px 40px rgba(0,0,0,0.25);
    }
    .winner-label {
      color: var(--muted);
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .winner-title { font-size: 1.5rem; font-weight: 700; line-height: 1.2; }
    .winner-sub { color: var(--muted); font-size: 0.9rem; margin-top: 0.3rem; }
    .winner-link {
      display: inline-block;
      margin-top: 0.85rem;
      color: var(--accent);
      text-decoration: underline;
      font-size: 0.95rem;
    }
    .confetti {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 600px;
      height: 400px;
      pointer-events: none;
    }
    /* Carousel grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.7rem;
    }
    .grid-card {
      padding: 0.85rem;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: var(--fg);
      text-decoration: none;
      display: block;
      min-height: 80px;
    }
    .grid-card-title { font-weight: 600; font-size: 0.95rem; line-height: 1.25; }
    .grid-card-sub { color: var(--muted); font-size: 0.8rem; margin-top: 0.35rem; }
    .grid-poster {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 6px;
      background: var(--input-bg);
      margin-bottom: 0.5rem;
      display: block;
    }
    .grid-poster.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-weight: 700;
      font-size: 2rem;
    }
    .winner-poster {
      width: 130px;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 8px;
      margin: 0 auto 0.85rem;
      display: block;
      box-shadow: 0 8px 22px rgba(0,0,0,0.4);
    }
    footer {
      padding: 1.25rem 0 1.5rem;
      color: var(--muted);
      font-size: 0.75rem;
      text-align: center;
      letter-spacing: 0.04em;
    }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="title-group">
        <a id="back" href="#/" class="back" hidden aria-label="Back to all films">←</a>
        <h1 id="page-title">Films</h1>
      </div>
      <div class="meta">
        <span id="updated"></span>
        <details class="lists-menu">
          <summary>Lists ▾</summary>
          <div class="lists-menu-dropdown" id="lists-menu"></div>
        </details>
        · <button id="refresh">refresh</button>
      </div>
    </header>

    <div class="search-wrap" id="search-wrap">
      <input id="search" type="search" placeholder="Search title, director, genre…" autocomplete="off" spellcheck="false">
      <div class="count" id="count"></div>
    </div>

    <div id="status" class="state">Loading…</div>
    <ul class="films" id="films" hidden></ul>
    <section id="film-detail" class="film-detail" hidden></section>
    <section id="wheel-view" class="wheel-view" hidden></section>

    <footer>
      <span id="size"></span> · <button id="fresh" type="button" style="background:none;border:0;color:inherit;font:inherit;cursor:pointer;text-decoration:underline;padding:0;">pull fresh data from solvors-mbp</button>
    </footer>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
