<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0d12" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f7f7f9" media="(prefers-color-scheme: light)">
  <title>Nataas' Film Library</title>
  <link rel="apple-touch-icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ── Cinema editorial palette ──
       Warm, theatrically dark. Amber as marquee accent.
       Terracotta as warm secondary. Fraunces (display) +
       Outfit (body). Subtle film-grain noise overlay. */
    :root {
      color-scheme: dark;
      --bg: #0F0D0B;            /* houselights down */
      --bg-2: #16130F;           /* deeper recess */
      --surface: #1F1B16;        /* card */
      --surface-2: #29231D;      /* hover surface */
      --border: #38302A;
      --fg: #F2EAD9;             /* warm off-white */
      --fg-soft: #C6BEB0;
      --muted: #8F8676;
      --accent: #F4A100;         /* marquee amber */
      --accent-soft: rgba(244, 161, 0, 0.16);
      --warn: #C95A47;           /* terracotta — used for "watched" + alerts */
      --warn-soft: rgba(201, 90, 71, 0.18);
      --wheel-a: #2A2520;
      --wheel-b: #3A322B;
      --wheel-fg: #F2EAD9;
      --radius: 14px;
      --radius-lg: 22px;
      --shadow-lg: 0 28px 60px -20px rgba(0,0,0,0.75);
      /* Aliases for older selectors — keeps legacy CSS working
         while the rest of the file migrates. */
      --card: var(--surface);
      --card-border: var(--border);
      --input-bg: var(--surface-2);
      --on: var(--accent);
      --off: var(--warn);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    body {
      font-family: "Outfit", -apple-system, system-ui, sans-serif;
      font-feature-settings: "ss01", "ss02";
      background: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
      letter-spacing: -0.005em;
      -webkit-font-smoothing: antialiased;
    }
    /* Film-grain noise overlay — subtle, fixed, never interactive. */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.045;
      mix-blend-mode: overlay;
      z-index: 9999;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.85'/></svg>");
    }
    /* Subtle warm vignette in the background — like cinema curtain glow. */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      background:
        radial-gradient(circle at 50% 0%, rgba(244,161,0,0.06), transparent 55%),
        radial-gradient(circle at 50% 110%, rgba(201,90,71,0.05), transparent 60%);
    }
    body.modal-open { overflow: hidden; }
    h1, h2, h3, .display { font-family: "Fraunces", "Outfit", serif; font-variation-settings: "opsz" 72; }
    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: env(safe-area-inset-top) 1.25rem env(safe-area-inset-bottom);
    }
    header {
      padding: 1.5rem 0 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
    }
    .title-group { display: flex; align-items: center; gap: 0.75rem; min-width: 0; }
    .back {
      color: var(--muted);
      text-decoration: none;
      font-size: 1.1rem;
      padding: 0.25rem 0.5rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      transition: color .2s ease, border-color .2s ease, background .2s ease;
      line-height: 1;
    }
    .back:hover { color: var(--accent); border-color: var(--accent); }
    h1 {
      font-family: "Fraunces", serif;
      font-variation-settings: "opsz" 72;
      font-size: 1.35rem;
      font-weight: 700;
      margin: 0;
      color: var(--fg);
      letter-spacing: -0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* Brand wordmark = home button */
    .brand {
      font-family: "Fraunces", serif;
      font-variation-settings: "opsz" 72;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--fg);
      text-decoration: none;
      letter-spacing: -0.02em;
      white-space: nowrap;
      transition: color .2s ease;
    }
    .brand:hover { color: var(--accent); }
    /* "Lists ▾" header dropdown to navigate between views */
    .lists-menu { position: relative; display: inline-block; }
    .lists-menu summary {
      list-style: none;
      cursor: pointer;
      color: var(--muted);
      user-select: none;
    }
    .lists-menu summary::-webkit-details-marker { display: none; }
    .lists-menu-dropdown {
      position: absolute;
      top: 100%;
      right: 0;
      margin-top: 0.4rem;
      min-width: 220px;
      max-height: 60vh;
      overflow: auto;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      box-shadow: 0 12px 28px rgba(0,0,0,0.35);
      padding: 0.4rem;
      z-index: 30;
    }
    .lists-menu-dropdown a {
      display: flex;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.55rem 0.7rem;
      border-radius: 8px;
      color: var(--fg);
      text-decoration: none;
      font-size: 0.95rem;
    }
    .lists-menu-dropdown a:hover { background: var(--input-bg); }
    .lists-menu-dropdown a.current { color: var(--accent); }
    .lists-menu-dropdown .count { color: var(--muted); font-size: 0.8rem; }
    .lists-menu-dropdown .empty {
      color: var(--muted);
      padding: 0.55rem 0.7rem;
      font-size: 0.85rem;
    }
    .meta {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.04em;
    }
    .meta button {
      background: none;
      border: 0;
      color: var(--muted);
      cursor: pointer;
      font: inherit;
      text-decoration: underline;
      padding: 0;
    }
    .search-wrap {
      position: sticky;
      top: 0;
      background: var(--bg);
      padding: 0.5rem 0 1rem;
      z-index: 1;
    }
    input[type="search"] {
      width: 100%;
      padding: 0.95rem 1.1rem;
      font-size: 1rem;
      font-family: inherit;
      background: var(--surface);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      -webkit-appearance: none;
      transition: border-color 0.18s ease, background 0.18s ease;
    }
    input[type="search"]::placeholder { color: var(--muted); }
    input[type="search"]:focus {
      border-color: var(--accent);
      background: var(--surface-2);
    }
    .count {
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 0.55rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
    }
    ul.films {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 0.5rem;
    }
    li.film {
      display: grid;
      grid-template-columns: 0.5rem 3rem 1fr auto auto;
      gap: 0.85rem;
      align-items: center;
      padding: 0.85rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.18s ease, border-color 0.18s ease, transform 0.1s ease;
      position: relative;
      opacity: 0;
      animation: rowReveal 0.5s ease-out forwards;
    }
    li.film:hover {
      background: var(--surface-2);
      border-color: rgba(244,161,0,0.35);
    }
    li.film:active { transform: scale(0.995); }
    @keyframes rowReveal {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .film-thumb {
      width: 3rem;
      height: 4.5rem;
      object-fit: cover;
      border-radius: 6px;
      background: var(--surface-2);
      box-shadow: 0 4px 10px -4px rgba(0,0,0,0.5);
    }
    .film-thumb.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-weight: 700;
      font-size: 1.1rem;
      font-family: "Fraunces", serif;
    }
    .film-main { min-width: 0; }
    .lists-chip {
      display: inline-block;
      margin-left: 0.55rem;
      padding: 0.05rem 0.55rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.76rem;
      font-weight: 500;
      vertical-align: middle;
      letter-spacing: 0.01em;
    }
    /* Dropdown for managing lists per film — absolute-positioned
       popover anchored to the + button on the right of the row. */
    li.film .list-menu { position: relative; }
    li.film .list-menu summary {
      list-style: none;
      cursor: pointer;
      width: 2.2rem;
      height: 2.2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--muted);
      font-size: 1.1rem;
      font-weight: 600;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    li.film .list-menu summary::-webkit-details-marker { display: none; }
    li.film .list-menu[open] summary { color: var(--accent); border-color: var(--accent); }
    /* Each row keeps a `transform` from the rowReveal animation (fill
       forwards) → every row is its own stacking context, so a later
       row paints over an earlier row's open dropdown regardless of the
       dropdown's z-index. Lift the row whose menu is open above its
       siblings so the dropdown clears the rows below it. */
    li.film:has(.list-menu[open]) { z-index: 40; }
    li.film .list-dropdown {
      position: absolute;
      top: calc(100% + 0.5rem);
      right: 0;
      z-index: 20;
      min-width: 240px;
      max-width: 90vw;
      max-height: 60vh;
      overflow: auto;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 0.85rem;
      box-shadow: 0 12px 28px rgba(0,0,0,0.35);
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .list-row {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.25rem 0;
      cursor: pointer;
    }
    .list-row input[type="checkbox"] {
      width: 1.1rem; height: 1.1rem;
      accent-color: var(--accent);
    }
    .list-dropdown .empty {
      color: var(--muted);
      font-size: 0.85rem;
      padding: 0.25rem 0;
    }
    .new-list-form {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .new-list-form input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      background: var(--input-bg);
      color: var(--fg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      font: inherit;
      font-size: 0.9rem;
    }
    .new-list-form input:focus { outline: none; border-color: var(--accent); }
    .new-list-form button {
      padding: 0 1rem;
      background: var(--accent);
      color: #0b0d12;
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .dot {
      width: 0.45rem;
      height: 0.45rem;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px rgba(244,161,0,0.55);
    }
    .dot.watched {
      background: var(--muted);
      box-shadow: none;
      opacity: 0.55;
    }
    .title {
      font-family: "Fraunces", serif;
      font-variation-settings: "opsz" 40;
      font-weight: 600;
      font-size: 1.02rem;
      line-height: 1.25;
      letter-spacing: -0.015em;
      color: var(--fg);
    }
    .sub {
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 0.2rem;
      font-weight: 400;
    }
    .rating {
      color: var(--accent);
      font-size: 0.92rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      letter-spacing: -0.01em;
    }
    .rating::before {
      content: "★";
      margin-right: 0.15rem;
      font-size: 0.85em;
      opacity: 0.65;
    }
    .state {
      padding: 2rem 0;
      text-align: center;
      color: var(--muted);
    }
    .state.error { color: #ff7a59; }
    /* Film detail view ─────────────────────────────────────────── */
    .film-detail {
      padding: 0.5rem 0 1rem;
      position: relative;
    }
    .detail-backdrop {
      position: absolute;
      inset: -0.5rem -1.25rem auto -1.25rem;
      height: 240px;
      background-size: cover;
      background-position: center;
      opacity: 0.18;
      filter: blur(20px);
      pointer-events: none;
      z-index: -1;
    }
    .detail-head {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 1rem;
      align-items: start;
      margin-bottom: 1.25rem;
    }
    /* No poster → text spans the full width instead of being trapped
       in the empty 110px poster column. */
    .detail-head.no-poster { grid-template-columns: 1fr; }
    .detail-poster {
      width: 110px;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 8px 22px rgba(0,0,0,0.4);
      background: var(--input-bg);
    }
    .detail-text { min-width: 0; }
    .ext-link {
      color: var(--muted);
      text-decoration: underline;
    }
    .rating-pill.plex {
      background: rgba(255,122,89,0.12);
      color: var(--off);
    }
    .film-detail .title {
      font-family: "Fraunces", serif;
      font-variation-settings: "opsz" 72;
      font-size: 1.85rem;
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.025em;
      margin: 0 0 0.55rem;
      color: var(--fg);
      /* Hero title wraps — override the list h1's nowrap/ellipsis so
         longer titles aren't truncated to "Hot F…". */
      white-space: normal;
      overflow: visible;
      text-overflow: clip;
    }
    .film-detail .meta-row {
      color: var(--muted);
      font-size: 0.95rem;
      margin: 0 0 1rem;
      line-height: 1.5;
    }
    .film-detail .meta-row .rating-pill {
      display: inline-block;
      padding: 0 0.5rem;
      margin-left: 0.4rem;
      border-radius: 999px;
      background: rgba(102, 224, 122, 0.13);
      color: var(--accent);
      font-variant-numeric: tabular-nums;
    }
    .film-detail .tagline {
      font-style: italic;
      color: var(--muted);
      margin: 0 0 1rem;
    }
    .film-detail .summary {
      line-height: 1.5;
      margin: 0 0 1.5rem;
    }
    .film-detail .credits {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 0.4rem 1rem;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .film-detail .credits dt {
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.78rem;
      align-self: baseline;
      padding-top: 0.1rem;
    }
    .film-detail .credits dd { margin: 0; }
    .film-detail .lists-section {
      padding-top: 1rem;
      border-top: 1px solid var(--card-border);
    }
    .film-detail .lists-section h2 {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 0.75rem;
    }
    .film-detail .lists-section .list-row {
      padding: 0.4rem 0;
    }
    /* Wheel / carousel view ─────────────────────────────────────── */
    .wheel-view {
      padding: 1.25rem 0 2.5rem;
    }
    .wheel-controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .wheel-controls .chips {
      display: flex; gap: 0.4rem; flex-wrap: wrap;
    }
    .wheel-controls .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.45rem 0.95rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--fg-soft);
      background: var(--surface);
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    }
    .wheel-controls .chip small {
      color: var(--muted);
      font-size: 0.78rem;
    }
    .wheel-controls .chip:hover {
      border-color: var(--accent);
      color: var(--fg);
    }
    .wheel-controls .chip.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
    }
    .wheel-controls .mode {
      margin-left: auto;
      display: inline-flex;
      gap: 0;
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 3px;
      background: var(--surface);
    }
    .wheel-controls .mode a { text-decoration: none; display: inline-block; }
    .wheel-controls .mode button {
      padding: 0.4rem 0.95rem;
      font-size: 0.85rem;
      font-weight: 500;
      width: auto;
      background: transparent;
      border: 0;
      border-radius: 999px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.18s ease, color 0.18s ease;
    }
    .wheel-controls .mode a.active button,
    .wheel-controls .mode button.active {
      background: var(--accent);
      color: #0F0D0B;
    }
    /* "Spinning from <list>" banner — makes the wheel's scope explicit. */
    .wheel-scope {
      text-align: center;
      color: var(--fg-soft);
      font-size: 0.9rem;
      margin: -0.5rem 0 0.25rem;
    }
    .wheel-scope strong { color: var(--accent); font-weight: 600; }
    .wheel-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      position: relative;
    }
    .wheel-box .wheel {
      width: 100%;
      max-width: 520px;
      aspect-ratio: 1;
      filter: drop-shadow(0 30px 60px rgba(0,0,0,0.6));
    }
    /* Rotation pivot — explicit so CSS transforms anchor at the
       SVG's geometric center, not its top-left default. */
    .wheel-box .wheel-rotor {
      transform-box: fill-box;
      transform-origin: 50% 50%;
    }
    .wheel-pointer { filter: drop-shadow(0 2px 6px rgba(0,0,0,0.7)); }
    .spin-btn {
      width: auto;
      padding: 1rem 3.5rem;
      background: var(--accent);
      color: #0F0D0B;
      border: 0;
      border-radius: 999px;
      font-size: 1.05rem;
      font-weight: 700;
      font-family: inherit;
      letter-spacing: 0.02em;
      cursor: pointer;
      box-shadow: 0 14px 30px -8px rgba(244,161,0,0.55), inset 0 1px 0 rgba(255,255,255,0.3);
      transition: transform 0.08s ease, box-shadow 0.18s ease;
    }
    .spin-btn:hover { transform: translateY(-1px); box-shadow: 0 18px 36px -8px rgba(244,161,0,0.6); }
    .spin-btn:active { transform: translateY(0); }
    .spin-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }
    .spin-btn span { display: inline-block; }

    /* Winner modal — full-screen overlay on top of the wheel. */
    .winner-modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      z-index: 2000;
      animation: fadeIn 0.25s ease-out;
    }
    .winner-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 13, 11, 0.78);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .winner-card-wrap {
      position: relative;
      max-width: 380px;
      width: 100%;
      animation: zoomIn 0.4s cubic-bezier(0.2, 0.95, 0.3, 1.15);
    }
    .winner-close {
      position: absolute;
      top: -3rem;
      right: -0.2rem;
      width: 2.4rem;
      height: 2.4rem;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--fg-soft);
      font-size: 1.3rem;
      cursor: pointer;
      font-family: inherit;
      line-height: 1;
    }
    .winner-close:hover { color: var(--fg); border-color: var(--accent); }
    .winner-card {
      padding: 2rem 1.75rem;
      border-radius: var(--radius-lg);
      background: linear-gradient(180deg, var(--surface) 0%, var(--bg-2) 100%);
      border: 1px solid var(--border);
      text-align: center;
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }
    .winner-poster {
      width: 140px;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 10px;
      display: block;
      margin: 0 auto 1.25rem;
      box-shadow: 0 18px 30px -6px rgba(0,0,0,0.55), 0 0 0 1px var(--accent);
    }
    .winner-poster.placeholder {
      display: flex; align-items: center; justify-content: center;
      background: var(--surface-2); color: var(--muted);
      font-weight: 700; font-size: 2.5rem;
    }
    .winner-label {
      color: var(--accent);
      font-size: 0.7rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      font-weight: 600;
    }
    .winner-title {
      font-family: "Fraunces", serif;
      font-variation-settings: "opsz" 72;
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1.1;
      color: var(--fg);
      letter-spacing: -0.02em;
    }
    .winner-sub {
      color: var(--fg-soft);
      font-size: 0.95rem;
      margin-top: 0.55rem;
      letter-spacing: 0.01em;
    }
    .winner-rating {
      display: inline-block;
      padding: 0.05rem 0.55rem;
      margin-left: 0.4rem;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .winner-actions {
      margin-top: 1.5rem;
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .winner-link {
      display: inline-flex;
      align-items: center;
      padding: 0.7rem 1.25rem;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      text-decoration: none;
      border: 1px solid transparent;
      transition: transform 0.08s ease, background 0.15s ease, color 0.15s ease;
    }
    .winner-link.primary {
      background: var(--accent);
      color: #0F0D0B;
    }
    .winner-link.primary:hover { background: #FFB733; }
    .winner-link.secondary {
      background: transparent;
      color: var(--fg-soft);
      border-color: var(--border);
    }
    .winner-link.secondary:hover { color: var(--fg); border-color: var(--accent); }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes zoomIn {
      from { transform: scale(0.85); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .confetti {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      z-index: 2100;
    }
    /* Carousel grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.7rem;
    }
    .grid-card {
      padding: 0.85rem;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: var(--fg);
      text-decoration: none;
      display: block;
      min-height: 80px;
    }
    .grid-card-title { font-weight: 600; font-size: 0.95rem; line-height: 1.25; }
    .grid-card-sub { color: var(--muted); font-size: 0.8rem; margin-top: 0.35rem; }
    .grid-poster {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 6px;
      background: var(--input-bg);
      margin-bottom: 0.5rem;
      display: block;
    }
    .grid-poster.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-weight: 700;
      font-size: 2rem;
    }
    .winner-poster {
      width: 130px;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      border-radius: 8px;
      margin: 0 auto 0.85rem;
      display: block;
      box-shadow: 0 8px 22px rgba(0,0,0,0.4);
    }
    footer {
      padding: 1.25rem 0 1.5rem;
      color: var(--muted);
      font-size: 0.75rem;
      text-align: center;
      letter-spacing: 0.04em;
    }
    /* Primary top nav — All films / Lists / Lottery. Always visible,
       big tap targets, active tab in marquee amber. */
    .topnav {
      display: flex;
      gap: 0.4rem;
      margin: 0 0 0.9rem;
    }
    .topnav-item {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.65rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--fg-soft);
      font-size: 0.92rem;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      transition: border-color .15s ease, color .15s ease, background .15s ease;
    }
    .topnav-item:hover { border-color: var(--accent); color: var(--fg); }
    .topnav-item.active,
    .topnav-lists.active > summary.topnav-item,
    .topnav-lists[open] > summary.topnav-item {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }
    .topnav-lists { position: relative; flex: 1; }
    .topnav-lists > summary { list-style: none; width: 100%; }
    .topnav-lists > summary::-webkit-details-marker { display: none; }
    /* Full-width dropdown under the Lists tab (overrides the header
       menu's right-anchored variant). */
    .topnav-lists-menu { left: 0; right: auto; z-index: 25; }
    .new-list-btn {
      display: block;
      width: 100%;
      text-align: left;
      margin-top: 0.3rem;
      padding: 0.55rem 0.7rem;
      border-radius: 8px;
      border: 1px dashed var(--border);
      background: transparent;
      color: var(--accent);
      font: inherit;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
    }
    .new-list-btn:hover { border-color: var(--accent); background: var(--accent-soft); }
    /* List view "pick from this list" bar (replaces search inside a list) */
    .list-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      padding: 0.25rem 0 1rem;
    }
    .list-bar-name { min-width: 0; color: var(--fg-soft); font-size: 0.95rem; }
    .list-bar-name strong { color: var(--fg); font-weight: 600; }
    .list-bar-name small { color: var(--muted); }
    .pick-from-list {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.1rem;
      border-radius: 999px;
      background: var(--accent);
      color: #0F0D0B;
      font-weight: 600;
      font-size: 0.92rem;
      text-decoration: none;
      white-space: nowrap;
      box-shadow: 0 10px 24px -10px rgba(244,161,0,0.6);
    }
    .pick-from-list:active { transform: translateY(1px); }
    /* Per-row remove button (shown instead of the + dropdown in list view) */
    .row-remove {
      width: 2.2rem;
      height: 2.2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color .15s ease, border-color .15s ease, background .15s ease;
    }
    .row-remove:hover { color: var(--warn); border-color: var(--warn); background: var(--warn-soft); }
    /* Generic app modal (New list) */
    .app-modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      z-index: 2000;
      animation: fadeIn 0.2s ease-out;
    }
    .app-modal-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15,13,11,0.78);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }
    .app-modal-card {
      position: relative;
      width: 100%;
      max-width: 360px;
      background: linear-gradient(180deg, var(--surface) 0%, var(--bg-2) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      box-shadow: var(--shadow-lg);
      animation: zoomIn 0.25s cubic-bezier(0.2,0.95,0.3,1.1);
    }
    .app-modal-card h2 { margin: 0 0 1rem; font-size: 1.25rem; }
    .app-modal-card input {
      width: 100%;
      padding: 0.8rem 1rem;
      font-size: 1rem;
      font-family: inherit;
      background: var(--input-bg);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      outline: none;
    }
    .app-modal-card input:focus { border-color: var(--accent); }
    .app-modal-actions { display: flex; justify-content: flex-end; gap: 0.6rem; margin-top: 1.25rem; }
    .app-btn {
      padding: 0.6rem 1.2rem;
      border-radius: 999px;
      font: inherit;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      border: 1px solid transparent;
    }
    .app-btn.primary { background: var(--accent); color: #0F0D0B; }
    .app-btn.secondary { background: transparent; color: var(--fg-soft); border-color: var(--border); }
    /* Floating scroll-to-top */
    .scroll-top {
      position: fixed;
      right: 1rem;
      bottom: calc(1rem + env(safe-area-inset-bottom));
      width: 2.9rem;
      height: 2.9rem;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--fg);
      font-size: 1.3rem;
      cursor: pointer;
      z-index: 1500;
      box-shadow: 0 10px 24px -8px rgba(0,0,0,0.6);
      opacity: 0.92;
    }
    .scroll-top:hover { border-color: var(--accent); color: var(--accent); }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <!-- Server-side-injected. The Worker replaces "__PICKER_SECRET__"
       with the real env.SECRET on every shell fetch, so the SPA
       never has to prompt the user for a key. Keep the sentinel
       string exactly like this — Worker matches on it literally. -->
  <script>window.__PICKER_SECRET = "__PICKER_SECRET__";</script>
  <div class="wrap">
    <header>
      <div class="title-group">
        <a id="back" href="#/" class="back" hidden aria-label="Back">←</a>
        <!-- Brand wordmark doubles as the home button — always "Films",
             always returns to all films. Current list/film name shows
             in-content, not here. -->
        <a id="page-title" href="#/" class="brand">Films</a>
      </div>
      <div class="meta">
        <span id="updated"></span>
        · <button id="refresh">refresh</button>
      </div>
    </header>

    <nav class="topnav" aria-label="Primary">
      <details class="topnav-lists" id="nav-lists">
        <summary class="topnav-item">Lists ▾</summary>
        <div class="lists-menu-dropdown topnav-lists-menu" id="nav-lists-menu"></div>
      </details>
      <a id="nav-lottery" href="#/wheel/all/spin" class="topnav-item">✨ Pick film</a>
    </nav>

    <div class="search-wrap" id="search-wrap">
      <input id="search" type="search" placeholder="Search title, director, genre…" autocomplete="off" spellcheck="false">
      <div class="count" id="count"></div>
    </div>

    <!-- List view replaces the search field with this bar: list name +
         "Pick from this list". Populated + toggled in app.js. -->
    <div id="list-bar" class="list-bar" hidden></div>

    <div id="status" class="state">Loading…</div>
    <ul class="films" id="films" hidden></ul>
    <section id="film-detail" class="film-detail" hidden></section>
    <section id="wheel-view" class="wheel-view" hidden></section>

    <footer>
      <span id="size"></span> · <button id="fresh" type="button" style="background:none;border:0;color:inherit;font:inherit;cursor:pointer;text-decoration:underline;padding:0;">pull fresh data from solvors-mbp</button>
    </footer>
  </div>

  <!-- New-list modal (opened from the Lists dropdown's New-list button) -->
  <div class="app-modal" id="list-modal" hidden role="dialog" aria-modal="true" aria-label="Create a new list">
    <div class="app-modal-backdrop" data-close></div>
    <form class="app-modal-card" id="list-modal-form">
      <h2>New list</h2>
      <input type="text" id="list-modal-input" placeholder="List name" autocapitalize="words" autocomplete="off" spellcheck="false">
      <div class="app-modal-actions">
        <button type="button" class="app-btn secondary" data-close>Cancel</button>
        <button type="submit" class="app-btn primary">Create</button>
      </div>
    </form>
  </div>

  <button id="scroll-top" class="scroll-top" hidden aria-label="Scroll to top">↑</button>

  <script type="module" src="./app.js"></script>
</body>
</html>
