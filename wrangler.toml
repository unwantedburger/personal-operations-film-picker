# Picker Worker config. Cloudflare serves /public assets first;
# anything else falls through to src/worker.js which handles the
# /lists API.
#
# PICKER KV namespace is the picker's own storage; separate from
# the VPN manager's namespace so the two services don't share state.

name = "personal-operations-film-picker"
main = "src/worker.js"
compatibility_date = "2026-01-01"

[assets]
directory = "./public"

[[kv_namespaces]]
binding = "PICKER"
id = "a4b1048fabeb4bb79ab14a54503ca1d7"
preview_id = "f204d026c62d4e89900d5abffdd9d753"
