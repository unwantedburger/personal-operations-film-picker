# Picker Worker config. The Worker handles every request
# (`run_worker_first = true`); static assets under public/ are
# fetched via the ASSETS binding from inside the Worker. This lets
# us serve a blank page at "/" and inject the SECRET into the app's
# index.html at the obscure path before returning it.
#
# PICKER KV namespace is the picker's own storage; separate from
# the VPN manager's namespace so the two services don't share state.

name = "personal-operations-film-picker"
main = "src/worker.js"
compatibility_date = "2026-01-01"

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[[kv_namespaces]]
binding = "PICKER"
id = "a4b1048fabeb4bb79ab14a54503ca1d7"
preview_id = "f204d026c62d4e89900d5abffdd9d753"

# Service binding to the VPN manager Worker. Bypasses the
# `*.workers.dev` routing edge-case where Worker → Worker fetches
# on the same account return 404. Doesn't modify the VPN Worker;
# read-only consumption.
[[services]]
binding = "VPN"
service = "vpn-manager"

# Enrichment job runs every 12h; no-ops when TMDB_TOKEN isn't set.
[triggers]
crons = ["0 */12 * * *"]
